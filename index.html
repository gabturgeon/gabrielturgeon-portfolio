// ─── HOOKS ───────────────────────────────────────────────────────────────────
function useScrollSpy() {
  const [a,setA] = useState("About");
  useEffect(() => {
    const h = () => { for (const id of [...NAV].reverse()) { const el=document.getElementById(id); if(el && window.scrollY>=el.offsetTop-130){setA(id);break;} } };
    window.addEventListener("scroll",h,{passive:true});
    return()=>window.removeEventListener("scroll",h);
  },[]);
  return a;
}

function useInView(ref,threshold=0.12) {
  const [v,setV] = useState(false);
  useEffect(()=>{
    const o=new IntersectionObserver(([e])=>{if(e.isIntersecting)setV(true);},{threshold});
    if(ref.current)o.observe(ref.current);
    return()=>o.disconnect();
  },[ref,threshold]);
  return v;
}

function useWidth() {
  const [w,setW] = useState(typeof window!=="undefined"?window.innerWidth:1200);
  useEffect(()=>{
    const h=()=>setW(window.innerWidth);
    window.addEventListener("resize",h,{passive:true});
    return()=>window.removeEventListener("resize",h);
  },[]);
  return w;
}

function Reveal({children,delay=0,y=26,x=0,style}) {
  const ref=useRef(null);
  const v=useInView(ref);
  return(
    <div ref={ref} style={{opacity:v?1:0,transform:v?"none":`translate(${x}px,${y}px)`,
      transition:`opacity 0.65s ease ${delay}ms,transform 0.65s ease ${delay}ms`,...style}}>
      {children}
    </div>
  );
}

function Ornament({t}) {

function DisplayHead({t,children,align="center"}) {
  const words=children.split(" ");const last=words.pop();
  return(
    <h2 style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontWeight:600,
      fontSize:"clamp(2rem,4.5vw,3.4rem)",lineHeight:1.08,letterSpacing:"-0.01em",
      marginBottom:6,textAlign:align,color:t.text}}>
      {words.join(" ")}{" "}
      <em style={{WebkitTextFillColor:"transparent",WebkitBackgroundClip:"text",
        backgroundClip:"text",backgroundImage:t.gradText,fontStyle:"italic"}}>{last}</em>
    </h2>
  );
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function Modal({item,t,onClose,isCommission}) {
  const w=useWidth();
  const isMobile=w<640;
  useEffect(()=>{
    const h=e=>{if(e.key==="Escape")onClose();};
    document.body.style.overflow="hidden";
    window.addEventListener("keydown",h);
    return()=>{document.body.style.overflow="";window.removeEventListener("keydown",h);};
  },[onClose]);
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,zIndex:3000,
      background:t.overlay,backdropFilter:"blur(10px)",
      display:"flex",alignItems:"center",justifyContent:"center",
      padding:isMobile?"12px":"24px",overflowY:"auto"}}>
      <div onClick={e=>e.stopPropagation()}
        style={{background:t.bgCard,borderRadius:20,border:`1px solid ${t.accentBorder}`,
          width:"100%",maxWidth:720,maxHeight:"90vh",overflowY:"auto",
          boxShadow:`0 40px 80px ${t.glow},0 0 0 1px ${t.border}`,
          animation:"modalIn 0.28s cubic-bezier(0.34,1.4,0.64,1)"}}>
        {/* Header */}
        <div style={{padding:isMobile?"20px 20px 16px":"28px 32px 20px",
          borderBottom:`1px solid ${t.border}`,display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12}}>
          <div style={{display:"flex",alignItems:"center",gap:14}}>
            <div style={{width:52,height:52,borderRadius:14,background:t.accentBg,
              border:`1px solid ${t.accentBorder}`,display:"flex",alignItems:"center",
              justifyContent:"center",flexShrink:0,color:t.accent}}>
              <IconGlyph name={item.icon} size={25}/>
            </div>
            <div>
              <h3 style={{fontFamily:"'Cormorant Garamond',serif",fontWeight:600,
                fontSize:isMobile?"20px":"24px",color:t.text,lineHeight:1.2}}>{item.title||item.client}</h3>
              {isCommission&&<div style={{fontFamily:"'Inter',sans-serif",color:t.accent,
                fontSize:10,fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase",marginTop:3}}>{item.type}</div>}
              {!isCommission&&<div style={{fontFamily:"'Cormorant Garamond',serif",color:t.muted,
                fontSize:14,fontStyle:"italic",marginTop:2}}>{item.year}</div>}
            </div>
          </div>
          <button onClick={onClose} style={{background:"transparent",border:`1px solid ${t.border}`,
            color:t.muted,width:32,height:32,borderRadius:16,cursor:"pointer",fontSize:18,
            display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,
            transition:"all 0.2s"}}
            onMouseOver={e=>{e.currentTarget.style.borderColor=t.accentBorder;e.currentTarget.style.color=t.accent;}}
            onMouseOut={e=>{e.currentTarget.style.borderColor=t.border;e.currentTarget.style.color=t.muted;}}>×</button>
        </div>
        {/* Body */}
        <div style={{padding:isMobile?"20px":"28px 32px"}}>
          {item.image&&(
            <div style={{height:isMobile?180:240,borderRadius:14,overflow:"hidden",
              border:`1px solid ${t.border}`,marginBottom:24,background:t.bgAlt}}>
              <img src={item.image} alt={`${item.title||item.client} visual`} loading="lazy"
                style={{width:"100%",height:"100%",objectFit:"cover",display:"block",
                  filter:"saturate(0.9) contrast(1.05)"}}/>
            </div>
          )}
          <p style={{fontFamily:"'Inter',sans-serif",color:t.sub,fontSize:14,
            lineHeight:1.8,marginBottom:24,fontWeight:400}}>{item.fullDesc}</p>
          {/* Highlights */}
          <div style={{marginBottom:24}}>
            <div style={{fontFamily:"'Inter',sans-serif",color:t.muted,fontSize:10,
              fontWeight:700,letterSpacing:"0.14em",textTransform:"uppercase",marginBottom:12}}>
              Key Highlights
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {item.highlights.map(h=>(
                <div key={h} style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:4,height:4,background:t.accent,borderRadius:"50%",flexShrink:0}}/>
                  <span style={{fontFamily:"'Inter',sans-serif",color:t.sub,fontSize:13,fontWeight:400}}>{h}</span>
                </div>
              ))}
            </div>
          </div>
          {/* Tags */}
          <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:24}}>
            {item.tags.map(tag=>(
              <span key={tag} style={{fontFamily:"'Inter',sans-serif",padding:"3px 10px",borderRadius:10,
                background:t.accentBg,border:`1px solid ${t.accentBorder}`,
                color:t.accent,fontSize:10,fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase"}}>{tag}</span>
            ))}
          </div>
          {/* Links */}
          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            {item.link&&(
              <a href={item.link} target="_blank" rel="noreferrer"
                style={{padding:"10px 24px",borderRadius:16,background:t.grad,color:"#fff",
                  fontFamily:"'Inter',sans-serif",fontWeight:600,fontSize:11,
                  letterSpacing:"0.1em",textTransform:"uppercase",textDecoration:"none",
                  transition:"all 0.2s",display:"inline-flex",alignItems:"center",gap:6}}
                onMouseOver={e=>e.currentTarget.style.transform="translateY(-1px)"}
                onMouseOut={e=>e.currentTarget.style.transform="none"}>
                {isCommission?"View Live Site ↗":"Live Demo ↗"}
              </a>
            )}
            {!isCommission&&item.github&&item.github!=="#"&&(

function ProximityText({children, t, baseColor}) {
  const text = String(children);
  const spansRef = useRef([]);
  const tRef = useRef(t);
  const baseColorRef = useRef(baseColor||t.text);
  useEffect(() => { tRef.current = t; }, [t]);
  useEffect(() => { baseColorRef.current = baseColor||t.text; }, [baseColor, t]);
  useEffect(() => {
    const MAX = 220;
    const onMove = (e) => {
      spansRef.current.forEach(span => {
        if (!span) return;
        const r = span.getBoundingClientRect();
        const p = Math.max(0, 1 - Math.hypot(e.clientX-(r.left+r.width/2), e.clientY-(r.top+r.height/2)) / MAX);
        const w = Math.round(300 + p * 500);
        span.style.fontVariationSettings = `"wght" ${w}`;
        span.style.fontWeight = w;
        span.style.color = p > 0.05 ? tRef.current.accent : baseColorRef.current;
        span.style.transform = `translateY(${-p*5}px) scale(${1+p*0.06})`;
      });
    };
    window.addEventListener('mousemove', onMove, {passive:true});
    return () => window.removeEventListener('mousemove', onMove);
  }, []);
  return(
    <>
      {text.split('').map((char,i) =>
        char === ' ' ? <span key={i}>&nbsp;</span> :
        <span key={i} ref={el=>spansRef.current[i]=el}
          style={{display:'inline-block', color:baseColor||t.text,
            transition:'color 0.18s ease-out,transform 0.18s ease-out,font-weight 0.18s ease-out'}}>
          {char}
        </span>
      )}
    </>
  );
}

    const tick=()=>{const s=st.current,c=TITLES[s.ti];if(s.pause>0){s.pause--;return;}

// ─── IMAGE SLIDER ─────────────────────────────────────────────────────────────
function ImageSlider({images, t}) {
  const [idx,setIdx]=useState(0);
  const [hov,setHov]=useState(false);
  useEffect(()=>{
    if(!images||images.length<=1)return;
    const id=setInterval(()=>setIdx(i=>(i+1)%images.length),3200);
    return()=>clearInterval(id);
  },[images?.length]);
  if(!images||!images.length)return null;
  return(
    <div style={{position:"relative",height:160,overflow:"hidden",borderRadius:"0 0 0 0",flexShrink:0}}
      onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}>
      {images.map((src,i)=>(
        <img key={i} src={src} alt="" style={{position:"absolute",inset:0,width:"100%",height:"100%",
          objectFit:"cover",opacity:i===idx?1:0,transition:"opacity 0.6s ease",
          filter:"saturate(0.9) contrast(1.05)"}}/>
      ))}
      <div style={{position:"absolute",inset:0,background:"linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.35) 100%)",pointerEvents:"none"}}/>
      {images.length>1&&(
        <div style={{position:"absolute",bottom:8,left:0,right:0,display:"flex",justifyContent:"center",gap:5,pointerEvents:"none"}}>
          {images.map((_,i)=>(
            <div key={i} style={{width:i===idx?16:5,height:5,borderRadius:999,
              background:i===idx?"#e8001a":"rgba(255,255,255,0.55)",transition:"all 0.3s"}}/>
          ))}
        </div>
      )}
      {hov&&images.length>1&&(
        <>
          <button onClick={e=>{e.stopPropagation();setIdx(i=>(i-1+images.length)%images.length);}}
            style={{position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",
              background:"rgba(0,0,0,0.55)",border:"none",color:"#fff",width:26,height:26,
              borderRadius:"50%",cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
          <button onClick={e=>{e.stopPropagation();setIdx(i=>(i+1)%images.length);}}
            style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",
              background:"rgba(0,0,0,0.55)",border:"none",color:"#fff",width:26,height:26,
              borderRadius:"50%",cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
        </>
      )}
    </div>
  );
}

    transition:"all 0.22s",boxShadow:focused===f?`0 0 0 3px ${t.glow}`:"none",
  });

  const cells=[];
  const fd=firstDay(year,month);const dim=daysInMonth(year,month);
  for(let i=0;i<fd;i++)cells.push(null);
  for(let d=1;d<=dim;d++)cells.push(d);

  return(
    <section id="Book" style={{padding:`${isMobile?"60px":"90px"} 20px`,position:"relative",zIndex:2}}>
      <div style={{maxWidth:860,margin:"0 auto"}}>
        <Reveal>

            <BoldLabel t={t}>Schedule</BoldLabel>
            <Ornament t={t}/>
            <DisplayHead t={t}>Book a Session</DisplayHead>

              maxWidth:400,margin:"12px auto 0",lineHeight:1.8,fontWeight:400}}>
              Pick a day and time that works for you. 30-minute discovery call — free.
            </p>
          </div>
        </Reveal>

        <Reveal delay={80}>
          <div style={{background:t.bgCard,borderRadius:24,
            border:`1px solid ${t.accentBorder}`,
            boxShadow:`0 0 50px ${t.glow}`,

              <div style={{padding:"60px 40px",textAlign:"center"}}>

                </p>
                <button onClick={()=>{setStep("cal");setSelectedDay(null);setSelectedSlot(null);setName("");setEmail("");setNote("");}}
                  style={{padding:"11px 28px",borderRadius:14,background:"transparent",
                    border:`1px solid ${t.border}`,color:t.sub,
                    fontFamily:"'Inter',sans-serif",fontWeight:500,fontSize:12,
                    letterSpacing:"0.08em",cursor:"pointer"}}>
                  Book Another
                </button>
              </div>
            ):step==="form"?(
              <div style={{padding:isMobile?"24px 20px":"36px 40px"}}>
                <button onClick={()=>setStep("cal")}
                  style={{background:"transparent",border:"none",color:t.muted,
                    cursor:"pointer",fontFamily:"'Inter',sans-serif",fontSize:12,
                    display:"flex",alignItems:"center",gap:6,marginBottom:24,padding:0}}>
                  ← Back to calendar
                </button>
                <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:28,
                  padding:"14px 18px",borderRadius:14,background:t.accentBg,border:`1px solid ${t.accentBorder}`}}>
                  <div style={{width:36,height:36,borderRadius:"50%",background:t.grad,
                    display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>📅</div>
                  <div>
                    <div style={{fontFamily:"'Inter',sans-serif",fontWeight:600,color:t.text,fontSize:13}}>
                      {MONTHS[month]} {selectedDay}, {year} · {selectedSlot}
                    </div>
                    <div style={{fontFamily:"'Inter',sans-serif",color:t.muted,fontSize:11,marginTop:2}}>
                      30-min discovery call · Free
                    </div>
                  </div>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:12}}>
                  <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:12}}>
                    <div>
                      <div style={{fontFamily:"'Inter',sans-serif",color:t.muted,fontSize:10,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:7}}>Your Name</div>
                      <input placeholder="John Doe" value={name} onChange={e=>setName(e.target.value)}
                        onFocus={()=>setFocused("name")} onBlur={()=>setFocused(null)} style={iStyle("name")}/>
                    </div>
                    <div>
                      <div style={{fontFamily:"'Inter',sans-serif",color:t.muted,fontSize:10,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:7}}>Email</div>
                      <input type="email" placeholder="your@email.com" value={email} onChange={e=>setEmail(e.target.value)}
                        onFocus={()=>setFocused("email")} onBlur={()=>setFocused(null)} style={iStyle("email")}/>
                    </div>
                  </div>
                  <div>
                    <div style={{fontFamily:"'Inter',sans-serif",color:t.muted,fontSize:10,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:7}}>What's this about? (optional)</div>

                      value={note} onChange={e=>setNote(e.target.value)}
                      onFocus={()=>setFocused("note")} onBlur={()=>setFocused(null)}
                      style={{...iStyle("note"),resize:"none"}}/>
                  </div>
                  <button onClick={()=>{if(name&&email)setStep("done");}}
                    disabled={!name||!email}
                    style={{padding:"14px",borderRadius:14,background:t.grad,border:"none",
                      color:"#fff",fontFamily:"'Inter',sans-serif",fontWeight:600,
                      fontSize:11,letterSpacing:"0.12em",textTransform:"uppercase",
                      cursor:name&&email?"pointer":"not-allowed",
                      opacity:name&&email?1:0.5,
                      boxShadow:`0 0 22px ${t.glow}`,transition:"all 0.22s",marginTop:4}}>
                    Confirm Booking →
                  </button>
                </div>
              </div>
            ):(
              <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":selectedDay?"1fr 1fr":"1fr",
                transition:"grid-template-columns 0.3s ease"}}>
                {/* Calendar */}
                <div style={{padding:isMobile?"24px 16px":"36px 32px",borderRight:!isMobile&&selectedDay?`1px solid ${t.border}`:"none"}}>
                  {/* Month nav */}
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24}}>
                    <button onClick={prevMonth}
                      style={{width:32,height:32,borderRadius:10,background:t.bgAlt,
                        border:`1px solid ${t.border}`,color:t.sub,cursor:"pointer",
                        display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>‹</button>
                    <span style={{fontFamily:"'Cormorant Garamond',serif",fontWeight:600,
                      fontSize:18,color:t.text}}>{MONTHS[month]} {year}</span>
                    <button onClick={nextMonth}
                      style={{width:32,height:32,borderRadius:10,background:t.bgAlt,
                        border:`1px solid ${t.border}`,color:t.sub,cursor:"pointer",
                        display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>›</button>
                  </div>
                  {/* Day headers */}
                  <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:8}}>
                    {DAYS.map(d=>(
                      <div key={d} style={{textAlign:"center",fontFamily:"'Inter',sans-serif",
                        fontSize:10,fontWeight:700,letterSpacing:"0.08em",
                        color:t.muted,padding:"4px 0"}}>{d}</div>
                    ))}
                  </div>
                  {/* Day cells */}
                  <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
                    {cells.map((d,i)=>(
                      <div key={i} onClick={()=>{if(d&&!isDisabled(d)){setSelectedDay(d);setSelectedSlot(null);}}}
                        style={{aspectRatio:"1",display:"flex",alignItems:"center",justifyContent:"center",
                          borderRadius:10,
                          background:d===selectedDay?t.grad:"transparent",
                          color:!d||isDisabled(d)?t.muted:d===selectedDay?"#fff":t.text,
                          fontFamily:"'Inter',sans-serif",fontSize:13,fontWeight:d===selectedDay?700:300,
                          cursor:d&&!isDisabled(d)?"pointer":"default",
                          border:`1px solid ${d===selectedDay?t.accent:"transparent"}`,
                          opacity:!d||isDisabled(d)?0.28:1,
                          transition:"all 0.18s",
                          boxShadow:d===selectedDay?`0 0 14px ${t.glow}`:"none"}}>
                        {d||""}
                      </div>
                    ))}
                  </div>
                </div>

                {/* Time slots */}
                {selectedDay&&(
                  <div style={{padding:isMobile?"16px":"36px 32px"}}>
                    <div style={{fontFamily:"'Inter',sans-serif",color:t.muted,fontSize:10,
                      fontWeight:700,letterSpacing:"0.14em",textTransform:"uppercase",marginBottom:16}}>
                      {MONTHS[month]} {selectedDay} · Available Times
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:8}}>
                      {SLOTS.map(s=>(
                        <button key={s} onClick={()=>setSelectedSlot(s)}
                          style={{padding:"12px 18px",borderRadius:14,
                            background:s===selectedSlot?t.grad:"transparent",
                            border:`1px solid ${s===selectedSlot?t.accent:t.border}`,
                            color:s===selectedSlot?"#fff":t.sub,
                            fontFamily:"'Inter',sans-serif",fontWeight:500,fontSize:13,
                            cursor:"pointer",textAlign:"left",
                            boxShadow:s===selectedSlot?`0 0 14px ${t.glow}`:"none",
                            transition:"all 0.18s"}}
                          onMouseOver={e=>{if(s!==selectedSlot){e.currentTarget.style.borderColor=t.accentBorder;e.currentTarget.style.color=t.text;}}}
                          onMouseOut={e=>{if(s!==selectedSlot){e.currentTarget.style.borderColor=t.border;e.currentTarget.style.color=t.sub;}}}>
                          {s}
                        </button>
                      ))}
                    </div>
                    {selectedSlot&&(
                      <button onClick={()=>setStep("form")}
                        style={{marginTop:20,width:"100%",padding:"13px",borderRadius:14,
                          background:t.grad,border:"none",color:"#fff",
                          fontFamily:"'Inter',sans-serif",fontWeight:600,fontSize:11,
                          letterSpacing:"0.12em",textTransform:"uppercase",cursor:"pointer",
                          boxShadow:`0 0 22px ${t.glow}`,transition:"all 0.22s"}}
                        onMouseOver={e=>{e.currentTarget.style.transform="translateY(-1px)";}}
                        onMouseOut={e=>{e.currentTarget.style.transform="none";}}>
                        Continue →
                      </button>
                    )}
                  </div>
                )}
              </div>
            )}
          </div>
        </Reveal>
      </div>
    </section>
  );
}

function LogoPreviewModal({logo,t,onClose}) {
  useEffect(()=>{
    const h=e=>{if(e.key==="Escape")onClose();};
    document.body.style.overflow="hidden";
    window.addEventListener("keydown",h);
    return()=>{document.body.style.overflow="";window.removeEventListener("keydown",h);};
  },[onClose]);
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,zIndex:4000,
      background:t.overlay,backdropFilter:"blur(14px)",WebkitBackdropFilter:"blur(14px)",
      display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}}>
      <div onClick={e=>e.stopPropagation()}

          <div>
            <div style={{fontFamily:"'Inter',sans-serif",fontWeight:700,color:t.text,fontSize:15}}>{logo.name}</div>
            <div style={{fontFamily:"'Inter',sans-serif",color:t.muted,fontSize:12,marginTop:3}}>{logo.desc}</div>
          </div>
          <button onClick={onClose}
            style={{background:"transparent",border:`1px solid ${t.border}`,
              color:t.muted,width:32,height:32,borderRadius:10,cursor:"pointer",fontSize:18,
              display:"flex",alignItems:"center",justifyContent:"center"}}
            onMouseOver={e=>{e.currentTarget.style.borderColor=t.accentBorder;e.currentTarget.style.color=t.accent;}}

      </div>

// ─── GLOBAL CSS ──────────────────────────────────────────────────────────────
function GlobalCSS({t}) {
  return<style dangerouslySetInnerHTML={{__html:`
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Inter:wght@100..900&display=swap');
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;background:${t.bg};color:${t.text}}
    ::selection{background:rgba(232,0,26,0.22);color:#fff}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:${t.bg}}
    ::-webkit-scrollbar-thumb{background:${t.accent};border-radius:2px}
    input::placeholder,textarea::placeholder{color:${t.muted};font-family:'Inter',sans-serif;font-weight:300}
    @keyframes floatA{0%,100%{transform:translate(0,0) scale(1)}40%{transform:translate(22px,-30px) scale(1.04)}70%{transform:translate(-14px,12px) scale(0.97)}}
    @keyframes floatB{0%,100%{transform:translate(0,0)}50%{transform:translate(-26px,20px) scale(1.05)}}
    @keyframes greenPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.55;transform:scale(1.35)}}
    @keyframes modalIn{from{opacity:0;transform:scale(0.93) translateY(16px)}to{opacity:1;transform:scale(1) translateY(0)}}
    @media (max-width:640px){
      section{padding-left:16px!important;padding-right:16px!important}
    }
  `}}/>;
}

function Portfolio() {
  const [dark,setDark]=useState(true);
  const [contactOpen,setContactOpen]=useState(false);
  const [avail,setAvail]=useState(()=>localStorage.getItem("avail")||"open");
  const [lang,setLang]=useState(()=>localStorage.getItem("lang")||"en");
  const tr=TR[lang];
  const toggleLang=()=>{const nl=lang==='en'?'fr':'en';setLang(nl);localStorage.setItem("lang",nl);};
  const t=dark?T.dark:T.light;
  const openContact=()=>setContactOpen(true);
  const closeContact=()=>setContactOpen(false);
  return(
    <LangContext.Provider value={{lang,tr}}>
    <div style={{background:t.bg,color:t.text,minHeight:"100vh",transition:"background 0.3s,color 0.3s"}}>
      <GlobalCSS t={t}/>

      {contactOpen&&<ContactPopup t={t} onClose={closeContact}/>}
      <main>
        <Hero t={t} onContact={openContact} avail={avail} setAvail={setAvail}/>
        <Skills t={t}/>
        <Commissions t={t}/>
        <Projects t={t}/>
        <Services t={t} onContact={openContact}/>
        <Experience t={t}/>
        <Testimonials t={t}/>
        <Contact t={t} onContact={openContact}/>
      </main>
      <Footer t={t}/>
    </div>
    </LangContext.Provider>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(Portfolio));
  </script>
</body>
</html>
